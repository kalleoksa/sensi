<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Sensi</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #1a1a1a;
        overflow: hidden;
        /* Kill page scroll/zoom/pull-to-refresh from in-game touch drags. */
        touch-action: none;
        overscroll-behavior: none;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
